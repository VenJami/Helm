# Health check: the server files parse, the frontend typechecks + builds, and
# a smoke test drives a real server (REST + WS + hook relay) against a
# keep-alive claude stand-in. Deeper features are still verified by hand
# against real claude panes (see docs/GOTCHAS.md "Testing pattern").
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax-check server
        run: |
          for f in server/index.mjs server/hook-post.mjs server/src/*.mjs; do
            node --check "$f"
          done
      - name: Install frontend deps
        working-directory: web
        run: npm ci
      - name: Audit frontend deps
        working-directory: web
        run: npm audit --audit-level=high
      - name: Lint frontend
        working-directory: web
        run: npm run lint
      - name: Format-check frontend
        working-directory: web
        run: npm run format:check
      - name: Typecheck frontend
        working-directory: web
        run: npx tsc --noEmit
      - name: Unit-test frontend
        working-directory: web
        run: npm test
      - name: Build frontend
        working-directory: web
        run: npm run build

  # Smoke test on Windows — matches production (node-pty runs natively) and
  # exercises the PTY / hook / lifecycle paths a build can't catch.
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install server deps
        working-directory: server
        run: npm ci   # exact, reproducible — matches the pinned node-pty (GOTCHAS)
      - name: Audit server deps
        working-directory: server
        run: npm audit --audit-level=high
      - name: Lint server
        working-directory: server
        run: npm run lint
      - name: Format-check server
        working-directory: server
        run: npm run format:check
      - name: Typecheck server (JSDoc + tsc --checkJs)
        working-directory: server
        run: npm run typecheck
      - name: Smoke test
        working-directory: server
        # One visible retry: windows-latest runners flake intermittently on
        # cold boots (same suite is consistently green locally and on retry).
        # A real regression still fails — it fails twice.
        run: |
          npm test || npm test
